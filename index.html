
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body,html{height:100%;}

/* ── 전체 앱 래퍼: 가로 레이아웃 ── */
#appWrap{position:relative;display:flex;height:100vh;overflow:hidden;background:var(--color-background-secondary,#f5f4ff);}

/* ── 왼쪽 사이드바 ── */
.sidebar{width:180px;min-width:160px;background:#26215C;color:#fff;display:flex;flex-direction:column;padding:16px 12px;gap:8px;flex-shrink:0;}
.sidebar-title{font-size:14px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:4px;word-break:keep-all;}
.sidebar-sub{font-size:11px;color:#AFA9EC;margin-bottom:12px;}
.tab-btn{width:100%;padding:10px 10px;border:none;border-radius:10px;background:rgba(255,255,255,0.1);color:#ccc;font-size:14px;cursor:pointer;font-family:var(--font-sans);transition:all 0.15s;text-align:left;}
.tab-btn.active{background:#7F77DD;color:#fff;font-weight:600;}
.tab-btn:hover:not(.active){background:rgba(255,255,255,0.18);}
.sidebar-bottom{margin-top:auto;font-size:11px;color:#7F77DD;line-height:1.6;}

/* ── 오른쪽 메인 영역 ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* 상단 헤더 바 */
.header-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-bottom:1px solid #e0ddf8;flex-shrink:0;flex-wrap:wrap;}
.header-bar h2{font-size:16px;font-weight:600;color:#26215C;}
.header-spacer{flex:1;}
.top-btn{padding:7px 13px;border-radius:8px;border:0.5px solid var(--color-border-secondary);font-size:13px;cursor:pointer;font-family:var(--font-sans);transition:all 0.15s;background:var(--color-background-secondary);color:var(--color-text-primary);}
.top-btn.eu{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC;}
.top-btn.mu{background:#FAECE7;color:#993C1D;border-color:#F0997B;}
.top-btn.edit{background:#fff;color:#555;border-color:#ccc;}

/* 범례 + sync */
.info-bar{display:flex;align-items:center;gap:6px;padding:8px 16px;background:#FAFAFA;border-bottom:1px solid #eee;flex-wrap:wrap;flex-shrink:0;}
.legend-bar{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.legend-item{display:flex;align-items:center;gap:3px;font-size:11px;color:#666;background:#fff;padding:2px 8px;border-radius:20px;border:0.5px solid #ddd;}
.sync-bar{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.sync-bar span{font-size:11px;color:#888;}
.sync-btn{padding:4px 10px;font-size:11px;border-radius:8px;border:0.5px solid #ccc;cursor:pointer;font-family:var(--font-sans);background:#fff;color:#444;}

/* 학생 그리드 스크롤 영역 */
.panels-wrap{flex:1;overflow-y:auto;padding:16px;}
.class-panel{display:none;}
.class-panel.active{display:block;}
.students-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}

/* 학생 카드 */
.student-card{background:#fff;border:1px solid #e8e5f5;border-radius:14px;padding:12px 6px 8px;text-align:center;transition:box-shadow 0.15s;}
.student-card:hover{box-shadow:0 4px 16px rgba(60,52,137,0.1);}
.char-img{width:90px;height:90px;margin:0 auto 4px;display:block;object-fit:contain;}
.student-name{font-size:12px;color:#26215C;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.score-row{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:5px;}
.score-num{font-size:14px;font-weight:700;color:#534AB7;}
.level-badge{font-size:10px;padding:1px 5px;border-radius:10px;background:#EEEDFE;color:#534AB7;font-weight:500;}
.btn-row{display:flex;gap:4px;}
.s-btn{flex:1;border:none;border-radius:6px;font-size:16px;padding:3px 0;cursor:pointer;transition:all 0.12s;}
.s-btn:active{transform:scale(0.9);}
.s-btn.eu{background:#EEEDFE;}
.s-btn.mu{background:#FAECE7;}

/* 모달/오버레이 */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(20,15,60,0.65);z-index:50;align-items:flex-start;justify-content:center;padding-top:60px;}
.overlay.open{display:flex;}
.modal-box{background:#ffffff;border-radius:16px;border:1px solid #d0cce8;padding:1.4rem;width:360px;max-width:95%;box-shadow:0 8px 32px rgba(60,52,137,0.18);}
.modal-box h3{font-size:15px;font-weight:600;margin-bottom:6px;color:#1a1a2e;}
.modal-desc{font-size:13px;color:#4a4a6a;margin-bottom:10px;line-height:1.5;}
.modal-btns{display:flex;gap:8px;margin-top:12px;}
.modal-btns button{flex:1;padding:9px;border-radius:8px;border:0.5px solid #ccc;font-size:13px;cursor:pointer;font-family:var(--font-sans);background:#f0eff8;color:#1a1a2e;}
.modal-btns .confirm{background:#3C3489;color:#fff;border-color:#3C3489;}
.modal-btns .confirm-red{background:#993C1D;color:#fff;border-color:#993C1D;}
.bulk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:6px;max-height:240px;overflow-y:auto;padding:2px;}
.b-chip{border:0.5px solid #ccc;border-radius:8px;padding:6px 4px;text-align:center;cursor:pointer;transition:all 0.12s;background:#f5f4ff;}
.b-chip:hover{border-color:#9990e0;}
.b-chip.excluded{background:#FCEBEB;border:1.5px dashed #E24B4A;}
.b-chip img{width:32px;height:32px;margin:0 auto 2px;display:block;object-fit:contain;}
.b-chip .cn{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#26215C;}
.b-chip.excluded .cn{color:#993C1D;}
.excl-count{font-size:12px;color:#4a4a6a;margin-bottom:8px;}
.excl-count span{color:#E24B4A;font-weight:500;}
.name-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:300px;overflow-y:auto;}
.name-row{display:flex;align-items:center;gap:5px;}
.name-row span{font-size:12px;color:#4a4a6a;min-width:18px;}
.name-input{flex:1;border:0.5px solid #ccc;border-radius:6px;padding:5px 7px;font-size:13px;font-family:var(--font-sans);background:#fff;color:#1a1a2e;}
.name-input:focus{outline:none;border-color:#7F77DD;}

/* 토스트/레벨업/컨페티 */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;}
.toast{background:#26215C;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity 0.3s;white-space:nowrap;}
.toast.show{opacity:1;}
.levelup-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(20,15,60,0.55);z-index:100;align-items:center;justify-content:center;}
.levelup-overlay.show{display:flex;}
.lu-box{background:#fff;border:2px solid #7F77DD;border-radius:16px;padding:20px 32px;text-align:center;}
.lu-name{font-size:14px;color:#534AB7;font-weight:500;margin-bottom:6px;}
.lu-msg{font-size:24px;font-weight:500;color:#26215C;}
.confetti-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;pointer-events:none;overflow:hidden;}
.confetti-overlay.show{display:block;}
.confetti-popup{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:20px;border:3px solid #3C3489;padding:28px 44px;text-align:center;box-shadow:0 12px 40px rgba(60,52,137,0.3);pointer-events:none;animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;}
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(0.5);opacity:0;}100%{transform:translate(-50%,-50%) scale(1);opacity:1;}}
.cp-emoji{font-size:48px;margin-bottom:8px;}
.cp-msg{font-size:26px;font-weight:700;color:#3C3489;white-space:nowrap;}
.cp-sub{font-size:14px;color:#534AB7;margin-top:6px;}
.confetti-particle{position:absolute;width:9px;height:9px;border-radius:2px;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{opacity:1;}100%{transform:var(--fall-tx) translateY(700px) rotate(720deg);opacity:0;}}
</style>

function getLevel(s){
  if(s>=51) return 5;
  if(s>=41) return 4;
  if(s>=31) return 3;
  if(s>=21) return 2;
  if(s>=11) return 1;
  return 0;
}

/* ── Firebase 초기화 & 데이터 로드 ── */
async function initFirebase(){
  setSyncStatus('Firebase 연결 중...');
  try{
    // Firebase SDK (compat 버전) 동적 로드
    await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js');

    if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    db=firebase.firestore();

    // 실시간 리스너 — 다른 기기에서 바꿔도 즉시 반영
    const [col,docId]=FB_DOC_PATH.split('/');
    db.collection(col).doc(docId).onSnapshot(snap=>{
      if(snap.exists){
        const remote=snap.data();
        data=remote;
        ensureDefaults();
        CLASSES.forEach(cls=>renderStudents(cls));
        const t=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
        setSyncStatus('실시간 동기화 중 🔥 '+t);
      } else {
        ensureDefaults();
        setSyncStatus('새 데이터 생성 중...');
        writeToFirebase();
      }
    },err=>{
      console.error(err);
      setSyncStatus('Firebase 오류 — 로컬 저장 사용');
      useLocalFallback();
    });
  }catch(e){
    console.error(e);
    setSyncStatus('Firebase 연결 실패 — 로컬 저장 사용');
    useLocalFallback();
  }
}

function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script');
    s.src=src;s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });
}

function useLocalFallback(){
  try{
    const saved=localStorage.getItem('euseuk_v5');
    if(saved) data=JSON.parse(saved);
  }catch(e){}
  ensureDefaults();
  CLASSES.forEach(cls=>renderStudents(cls));
}

async function writeToFirebase(){
  if(!db){
    // Firebase 미연결 시 로컬 저장
    try{localStorage.setItem('euseuk_v5',JSON.stringify(data));}catch(e){}
    return;
  }
  try{
    const [col,docId]=FB_DOC_PATH.split('/');
    await db.collection(col).doc(docId).set(data);
    const t=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('저장됨 ✓ '+t);
  }catch(e){
    setSyncStatus('저장 실패 ⚠️');
    try{localStorage.setItem('euseuk_v5',JSON.stringify(data));}catch(e2){}
  }
}

async function scheduleSave(){
  // 즉시 로컬 백업
  try{localStorage.setItem('euseuk_v5',JSON.stringify(data));}catch(e){}
  setSyncStatus('저장 중...');
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>writeToFirebase(),1200);
}

async function manualSave(){
  if(saveTimer)clearTimeout(saveTimer);
  setSyncStatus('저장 중...');
  await writeToFirebase();
}

function setSyncStatus(msg){document.getElementById('syncStatus').textContent=msg;}

function ensureDefaults(){
  CLASSES.forEach(cls=>{
    if(!data[cls])data[cls]={names:[...DEFAULT_NAMES[cls]],scores:{}};
    if(!data[cls].names)data[cls].names=[...DEFAULT_NAMES[cls]];
    data[cls].names.forEach(n=>{if(data[cls].scores[n]==null)data[cls].scores[n]=0;});
  });
}

/* ── 캐릭터 그리기 (5단계) ── */
/* ── 식물 캐릭터 그리기 ── */
function drawChar(canvas,level,score,size){
  const s=size||60;
  canvas.width=s;canvas.height=s;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,s,s);
  ctx.save();ctx.scale(s/60,s/60);
  const draw=[drawSeed,drawSprout,drawSapling,drawTree,drawBloomTree][level];
  draw(ctx,score);
  ctx.restore();
}

function pBar(ctx,score,x,y,w,col){
  const pct=(score%10)/10;
  ctx.fillStyle='rgba(0,0,0,0.1)';
  ctx.beginPath();ctx.roundRect(x,y,w,3,1.5);ctx.fill();
  if(pct>0){ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(x,y,w*pct,3,1.5);ctx.fill();}
}

/* 🌰 씨앗 (0~9) */
function drawSeed(ctx,score){
  // 흙
  ctx.fillStyle='#8B6340';
  ctx.beginPath();ctx.ellipse(30,52,18,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#A07850';
  ctx.beginPath();ctx.ellipse(30,50,14,4,0,0,Math.PI*2);ctx.fill();
  // 씨앗
  ctx.fillStyle='#8B4513';
  ctx.beginPath();ctx.ellipse(30,38,9,11,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#A0522D';
  ctx.beginPath();ctx.ellipse(27,34,3,4,-.3,0,Math.PI*2);ctx.fill();
  // 줄무늬
  ctx.strokeStyle='#6B3410';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(23,35);ctx.bezierCurveTo(21,38,22,42,24,44);ctx.stroke();
  ctx.beginPath();ctx.moveTo(30,27);ctx.lineTo(30,34);ctx.stroke();
  pBar(ctx,score,15,57,30,'#8B4513');
}

function drawSprout(ctx,score){

  ctx.strokeStyle='#4A9A28';ctx.lineWidth=1;

  pBar(ctx,score,15,58,30,'#5D8A3C');
}

function drawTree(ctx,score){

  ctx.strokeStyle='#7A5535';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(28,42);ctx.lineTo(15,33);ctx.stroke();

  ctx.beginPath();ctx.arc(30,20,13,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5DB535';
  ctx.beginPath();ctx.arc(30,16,11,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6DC840';
  ctx.beginPath();ctx.arc(22,14,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6DC840';
  ctx.beginPath();ctx.arc(38,14,8,0,Math.PI*2);ctx.fill();
  // 하이라이트
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath();ctx.arc(26,12,5,0,Math.PI*2);ctx.fill();
  pBar(ctx,score,12,59,36,'#3D7A20');
}

/* 🌸 꽃나무 (40~50) */
function drawBloomTree(ctx,score){
  // 흙
  ctx.fillStyle='#8B6340';
  ctx.beginPath();ctx.ellipse(30,56,18,4,0,0,Math.PI*2);ctx.fill();
  // 줄기
  ctx.fillStyle='#8B5E3C';
  ctx.beginPath();ctx.roundRect(26,35,8,22,3);ctx.fill();
  ctx.fillStyle='#A0714F';
  ctx.beginPath();ctx.roundRect(27,35,3,22,2);ctx.fill();
  // 가지
  ctx.strokeStyle='#7A5535';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(28,42);ctx.lineTo(15,33);ctx.stroke();
  ctx.beginPath();ctx.moveTo(32,38);ctx.lineTo(45,30);ctx.stroke();
  ctx.beginPath();ctx.moveTo(30,36);ctx.lineTo(30,28);ctx.stroke();
  // 잎 군집
  ctx.fillStyle='#3D7A20';
  ctx.beginPath();ctx.arc(15,29,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#4D9A28';
  ctx.beginPath();ctx.arc(45,26,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3D7A20';
  ctx.beginPath();ctx.arc(30,20,13,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5DB535';
  ctx.beginPath();ctx.arc(30,16,11,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6DC840';
  ctx.beginPath();ctx.arc(22,14,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6DC840';
  ctx.beginPath();ctx.arc(38,14,8,0,Math.PI*2);ctx.fill();
  // 꽃들 🌸
  function drawFlower(x,y,r,col){
    for(let i=0;i<5;i++){
      const a=i*Math.PI*2/5-Math.PI/2;
      ctx.fillStyle=col;
      ctx.beginPath();ctx.ellipse(x+r*1.3*Math.cos(a),y+r*1.3*Math.sin(a),r,r*.7,a,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='#FFE566';
    ctx.beginPath();ctx.arc(x,y,r*.8,0,Math.PI*2);ctx.fill();
  }
  drawFlower(14,22,4,'#FFB7C5');
  drawFlower(30,8,4.5,'#FF8FAB');
  drawFlower(46,20,4,'#FFB7C5');
  drawFlower(22,10,3.5,'#FFCDD8');
  drawFlower(38,10,3.5,'#FF9FBB');
  // 반짝임
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath();ctx.arc(26,12,4,0,Math.PI*2);ctx.fill();
  pBar(ctx,score,12,59,36,'#FF8FAB');
}

function drawCharSmall(canvas,level){
  const ctx=canvas.getContext('2d');
  canvas.width=32;canvas.height=32;
  ctx.clearRect(0,0,32,32);
  ctx.save();ctx.scale(32/60,32/60);
  const draw=[drawSeed,drawSprout,drawSapling,drawTree,drawBloomTree][level];
  draw(ctx,level*10+5);
  ctx.restore();
}

/* ── 렌더링 ── */
function renderStudents(cls){
  const grid=document.getElementById('grid_'+cls);
  if(!grid)return;
  grid.innerHTML='';
  data[cls].names.forEach(name=>{
    const score=data[cls].scores[name]||0;
    const level=getLevel(score);
    const card=document.createElement('div');
    card.className='student-card';
    card.id='card_'+cls+'_'+name;
    card.innerHTML=`
      <img class="char-img" id="cv_${cls}_${name}" src="${CHAR_IMGS[level]}" alt="${LEVELS[level]}">
      <div class="student-name">${name}</div>
      <div class="score-row">
        <span class="score-num">${score}</span>
        <span class="level-badge">${LEVEL_EMOJIS[level]} ${LEVELS[level]}</span>
      </div>
      <div class="btn-row">
        <button class="s-btn eu" onclick="givePoint('${cls}','${name}',1)">😄</button>
        <button class="s-btn mu" onclick="givePoint('${cls}','${name}',-1)">😅</button>
      </div>`;
    grid.appendChild(card);
  });
}

function updateCard(cls,name){
  const score=data[cls].scores[name]||0;
  const level=getLevel(score);
  const cv=document.getElementById('cv_'+cls+'_'+name);
  if(cv) cv.src=CHAR_IMGS[level];
  const card=document.getElementById('card_'+cls+'_'+name);
  if(card){
    card.querySelector('.score-num').textContent=score;
    card.querySelector('.level-badge').textContent=LEVEL_EMOJIS[level]+' '+LEVELS[level];
  }
}

async function givePoint(cls,name,delta){
  const prev=data[cls].scores[name]||0;
  data[cls].scores[name]=Math.max(0,Math.min(60,prev+delta));
  const next=data[cls].scores[name];
  updateCard(cls,name);
  await scheduleSave();
  if(delta>0&&getLevel(next)>getLevel(prev))showLevelUp(name,getLevel(next));
  showToast(delta>0?name+' 으쓱! 😄':name+' 머쓱 😅');
}

/* ── 전체 으쓱/머쓱 ── */
function openBulkOverlay(type){
  bulkExcludes=new Set();
  const cls=currentClass;
  const g=document.getElementById(type==='eu'?'bulkGEu':'bulkGMu');
  g.innerHTML='';
  data[cls].names.forEach(name=>{
    const level=getLevel(data[cls].scores[name]||0);
    const chip=document.createElement('div');
    chip.className='b-chip';
    chip.id='chip_'+type+'_'+name;
    const cvId='cCV_'+type+'_'+name;
    chip.innerHTML=`<img id="${cvId}" src="${CHAR_IMGS[level]}" style="width:32px;height:32px;object-fit:contain;margin:0 auto 2px;display:block;"><div class="cn">${name}</div>`;
    chip.onclick=()=>toggleChip(type,name);
    g.appendChild(chip);
  });
  document.getElementById(type==='eu'?'exCntEu':'exCntMu').textContent='0';
  document.getElementById(type==='eu'?'overlayEu':'overlayMu').classList.add('open');
}

function toggleChip(type,name){
  if(bulkExcludes.has(name))bulkExcludes.delete(name);
  else bulkExcludes.add(name);
  document.getElementById('chip_'+type+'_'+name).classList.toggle('excluded',bulkExcludes.has(name));
  document.getElementById(type==='eu'?'exCntEu':'exCntMu').textContent=bulkExcludes.size;
}

function closeOverlay(type){
  const m={eu:'overlayEu',mu:'overlayMu',name:'overlayName'};
  document.getElementById(m[type]).classList.remove('open');
  bulkExcludes=new Set();
}

function changeAmt(type, delta){
  const el=document.getElementById(type==='eu'?'amtEu':'amtMu');
  const val=Math.max(1,Math.min(10,(parseInt(el.value)||1)+delta));
  el.value=val;
}

async function confirmBulk(type){
  const cls=currentClass;let cnt=0;
  const amt=parseInt(document.getElementById(type==='eu'?'amtEu':'amtMu').value)||1;
  for(const name of data[cls].names){
    if(!bulkExcludes.has(name)){
      const prev=data[cls].scores[name]||0;
      data[cls].scores[name]=Math.max(0,Math.min(60,prev+(type==='eu'?amt:-amt)));
      cnt++;
    }
  }
  await scheduleSave();
  closeOverlay(type);
  renderStudents(cls);
  if(type==='eu'){
    showConfetti(cnt, amt);
  } else {
    showToast(cls+' '+cnt+'명 머쓱 😅');
  }
}

/* ── UI ── */
function switchTab(cls){
  currentClass=cls;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',CLASSES[i]===cls));
  document.querySelectorAll('.class-panel').forEach(p=>p.classList.toggle('active',p.id==='panel_'+cls));
  document.getElementById('currentClassTitle').textContent='1학년 '+cls;
}

function buildUI(){
  const tabBar=document.getElementById('tabBar'),panels=document.getElementById('panels');
  CLASSES.forEach((cls,i)=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(i===0?' active':'');
    btn.textContent='1학년 '+cls;
    btn.onclick=()=>switchTab(cls);
    tabBar.appendChild(btn);
    const panel=document.createElement('div');
    panel.className='class-panel'+(i===0?' active':'');
    panel.id='panel_'+cls;
    panel.innerHTML=`<div class="students-grid" id="grid_${cls}"></div>`;
    panels.appendChild(panel);
  });
}

/* ── 이름 수정 ── */
function openNameEdit(){
  const cls=currentClass;
  editingClass=cls;
  document.getElementById('nameEditDesc').textContent='1학년 '+cls+' 학생 이름을 수정하세요.';
  const g=document.getElementById('nameGrid');g.innerHTML='';
  data[cls].names.forEach((name,i)=>{
    const row=document.createElement('div');row.className='name-row';
    row.innerHTML=`<span>${i+1}</span><input class="name-input" id="ni_${i}" value="${name}" maxlength="10"/>`;
    g.appendChild(row);
  });
  document.getElementById('overlayName').classList.add('open');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function showLevelUp(name,level){
  document.getElementById('luName').textContent=name;
  document.getElementById('luMsg').textContent=LEVEL_MSGS[level]||'레벨 업!';
  const el=document.getElementById('levelupOverlay');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

function showConfetti(cnt, amt){
  amt = amt||1;
  const overlay=document.getElementById('confettiOverlay');
  const popup=document.getElementById('confettiPopup');
  document.getElementById('cpMsg').textContent=cnt+'명 으쓱! 😄';
  document.getElementById('cpSub').textContent='으쓱 +'+amt+'씩 획득!';
  // 기존 파티클 제거
  overlay.querySelectorAll('.confetti-particle').forEach(p=>p.remove());
  overlay.classList.add('show');
  // 파티클 생성
  const colors=['#3C3489','#7F77DD','#FFD700','#FF6B6B','#4ECB71','#FF9F43','#AFA9EC','#FF78AC'];
  const wrap=document.getElementById('appWrap');
  const W=wrap.offsetWidth||360;
  for(let i=0;i<60;i++){
    const p=document.createElement('div');
    p.className='confetti-particle';
    const x=Math.random()*W;
    const tx=(Math.random()-0.5)*200;
    p.style.cssText=`left:${x}px;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      --fall-tx:translateX(${tx}px);
      animation-duration:${1.2+Math.random()*2}s;
      animation-delay:${Math.random()*0.6}s;`;
    overlay.appendChild(p);
  }
  // 2.8초 후 닫기
  setTimeout(()=>{
    overlay.classList.remove('show');
    overlay.querySelectorAll('.confetti-particle').forEach(p=>p.remove());
    // 팝업 리셋
    popup.style.animation='none';
    popup.offsetHeight; // reflow
    popup.style.animation='';
  },2800);
}

(async()=>{
  buildUI();ensureDefaults();
  CLASSES.forEach(cls=>renderStudents(cls));
  await initFirebase();
})();
</script>
